# =============================================================================
# PostgreSQL Production Configuration
# =============================================================================
# Tuned for a 4GB RAM VPS with 1-50 CRM users
#
# WHY these settings:
# - Default PostgreSQL is tuned for a 128MB system from the 1990s
# - These settings use ~1GB RAM, leaving 3GB for Docker, Nginx, Node.js
# - Optimized for a CRUD workload (lots of small reads/writes)
# =============================================================================

# ─── CONNECTIONS ─────────────────────────────────────────────────────────────
# Max connections: Backend pool (20) + backup scripts (2) + admin (3)
max_connections = 30
# Superuser reserved connections for admin access during high load
superuser_reserved_connections = 3

# ─── MEMORY ──────────────────────────────────────────────────────────────────
# Shared buffers: ~25% of total RAM allocated to PostgreSQL (~256MB)
# WHY: This is where PostgreSQL caches frequently-accessed data
shared_buffers = 256MB

# Effective cache size: ~75% of total RAM for query planner hints
# WHY: Tells the query planner how much OS cache is available
effective_cache_size = 768MB

# Work memory per query sort/hash operation
# WHY: CRM queries are simple — 8MB is generous
work_mem = 8MB

# Maintenance work memory (VACUUM, CREATE INDEX)
# WHY: Larger = faster maintenance operations, run infrequently
maintenance_work_mem = 64MB

# ─── WAL (Write-Ahead Log) ──────────────────────────────────────────────────
# WHY WAL tuning: Controls durability vs performance tradeoff

# Checkpoint completion target: spread checkpoint I/O over time
checkpoint_completion_target = 0.9

# WAL segment size (in MB)
wal_buffers = 16MB

# Min WAL size before recycling
min_wal_size = 100MB
max_wal_size = 1GB

# ─── QUERY PLANNING ─────────────────────────────────────────────────────────
# Random page cost: 1.1 for SSD (default 4.0 is for spinning disks)
# WHY: VPS providers use SSDs — this tells the planner sequential and random
# I/O have similar costs, so it uses indexes more aggressively
random_page_cost = 1.1

# Effective I/O concurrency: higher for SSDs
effective_io_concurrency = 200

# ─── LOGGING ─────────────────────────────────────────────────────────────────
# Log slow queries (>500ms) for optimization
log_min_duration_statement = 500

# Log format with timestamps
log_line_prefix = '%m [%p] %u@%d '

# Log lock waits (helps debug performance issues)
log_lock_waits = on

# ─── SECURITY ───────────────────────────────────────────────────────────────
# Password encryption method
password_encryption = scram-sha-256

# ─── LOCALE & ENCODING ──────────────────────────────────────────────────────
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'

# ─── AUTOVACUUM ─────────────────────────────────────────────────────────────
# WHY: Autovacuum reclaims dead rows. Critical for a CRM with frequent updates.
autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 60
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# Listen on all interfaces within Docker network
listen_addresses = '*'
port = 5432
