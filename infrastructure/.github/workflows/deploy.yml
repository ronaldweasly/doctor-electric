# =============================================================================
# SolarCRM - GitHub Actions CI/CD Pipeline
# =============================================================================
# Triggers on push to main branch.
# Steps:
# 1. Run linting and type checking
# 2. Build frontend and backend Docker images (validates they compile)
# 3. SSH into VPS and run the deploy script
#
# Required GitHub Secrets:
#   VPS_HOST          - Server IP address
#   VPS_USER          - Deploy username (default: deploy)
#   VPS_SSH_KEY       - Private SSH key for the deploy user
#   VPS_SSH_PORT      - SSH port (default: 2222)
# =============================================================================

name: Deploy SolarCRM

on:
  push:
    branches: [main]
  # Allow manual deployment
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: production-deploy
  cancel-in-progress: false  # Don't cancel running deploys

env:
  PROJECT_DIR: /opt/solarcrm

jobs:
  # ─── LINT & TYPE CHECK ──────────────────────────────────────────────────────
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            infrastructure/frontend/package-lock.json
            infrastructure/backend/package-lock.json

      - name: Lint Frontend
        working-directory: infrastructure/frontend
        run: |
          npm ci
          npm run lint || true  # Don't fail on lint warnings

      - name: Lint Backend
        working-directory: infrastructure/backend
        run: |
          npm ci
          npx tsc --noEmit

  # ─── BUILD TEST ────────────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: infrastructure/frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=https://placeholder.example.com/api
            VITE_APP_NAME=SolarCRM

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: infrastructure/backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── DEPLOY TO VPS ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment: production  # Requires environment approval if configured

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 2222 }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e
            echo "🚀 Starting deployment..."
            
            cd ${{ env.PROJECT_DIR }}
            
            # Pull latest code
            git fetch origin main
            git reset --hard origin/main
            
            # Run the deploy script
            bash scripts/deploy.sh
            
            echo "✅ Deployment complete!"

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 2222 }}
          timeout: 30s
          script: |
            # Check all containers are running
            echo "Container status:"
            docker compose -f ${{ env.PROJECT_DIR }}/docker-compose.yml ps --format json | jq -r '.[] | "\(.Name): \(.State)"'
            
            # Check health endpoint
            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/health || echo "000")
            
            if [ "$HEALTH" = "200" ]; then
              echo "✅ Health check passed (HTTP $HEALTH)"
            else
              echo "⚠️ Health check returned HTTP $HEALTH"
              docker compose -f ${{ env.PROJECT_DIR }}/docker-compose.yml logs --tail=20 backend
              exit 1
            fi

      - name: Notify on Failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 2222 }}
          timeout: 30s
          script: |
            echo "⚠️ Deployment failed! Attempting rollback..."
            cd ${{ env.PROJECT_DIR }}
            bash scripts/deploy.sh --rollback
