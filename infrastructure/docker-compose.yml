# =============================================================================
# SolarCRM Production Docker Compose
# =============================================================================
# Target: Ubuntu 22.04 LTS VPS (4GB RAM, 2 vCPU)
# Architecture: Nginx → Frontend (static) → Backend API → PostgreSQL
#
# WHY this architecture:
# - The existing app talks directly to Supabase from the browser.
# - We're migrating to self-hosted PostgreSQL with a proper backend API
#   to eliminate Supabase dependency and reduce costs.
# - Nginx serves the static frontend AND reverse-proxies /api/* to backend.
# - PostgreSQL is NEVER exposed externally.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # NGINX - Reverse Proxy + Static Frontend Server
  # ---------------------------------------------------------------------------
  # WHY combined: For a small team, Nginx serves double duty — it serves the
  # built frontend static files AND proxies API requests. This saves a
  # container and ~100MB RAM vs running a separate Node server for the frontend.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: solarcrm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend-dist:/usr/share/nginx/html:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Resource limits for 4GB VPS
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ---------------------------------------------------------------------------
  # FRONTEND - Build Stage Only (not a running container)
  # ---------------------------------------------------------------------------
  # WHY build-only: Vite/React apps compile to static HTML/CSS/JS. Running a
  # Node server just to serve static files wastes ~200MB RAM. Instead, we build
  # once and copy the output to a shared volume that Nginx serves directly.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../                  # Root directory (has package.json, src/, vite.config.ts)
      dockerfile: infrastructure/frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_APP_NAME=${VITE_APP_NAME:-SolarCRM}
    container_name: solarcrm-frontend-build
    volumes:
      - frontend-dist:/app/dist
    # This container exits after copying build artifacts — that's intentional.
    # It runs `vite build` then copies dist/ to the shared volume.
    restart: "no"

  # ---------------------------------------------------------------------------
  # BACKEND API - Node.js/Express
  # ---------------------------------------------------------------------------
  # WHY a backend: The current app exposes Supabase keys to the browser.
  # A proper backend:
  # 1. Hides database credentials from the client
  # 2. Enforces business logic server-side
  # 3. Handles file uploads to R2
  # 4. Enables proper audit logging
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solarcrm-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-net
      - db-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  # ---------------------------------------------------------------------------
  # POSTGRESQL - Primary Database
  # ---------------------------------------------------------------------------
  # WHY self-hosted: Supabase free tier has limits. Self-hosted PostgreSQL on
  # the same VPS costs $0 extra, gives full control, and for 1-50 users the
  # performance is more than sufficient.
  #
  # SECURITY: Only accessible on the db-net network. NO port binding to host.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: solarcrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Performance tuning for 4GB VPS (PostgreSQL gets ~1GB)
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - db-net
    # IMPORTANT: No ports exposed to host. DB is internal only.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "0.50"

  # ---------------------------------------------------------------------------
  # UPTIME KUMA - Monitoring Dashboard
  # ---------------------------------------------------------------------------
  # WHY Uptime Kuma: Free, self-hosted, lightweight (~50MB RAM). Monitors all
  # services + external endpoints. Sends alerts via Telegram/Email/Discord.
  # ---------------------------------------------------------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: solarcrm-monitor
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      - "127.0.0.1:3001:3001"  # Only accessible locally, proxied via Nginx
    networks:
      - frontend-net
      - backend-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ===========================================================================
