# =============================================================================
# NETWORKS
# =============================================================================
# WHY three networks:
# - frontend-net: Nginx ↔ Monitoring (public-facing services)
# - backend-net: Nginx ↔ Backend ↔ Monitoring (API layer)
# - db-net: Backend ↔ PostgreSQL (database layer, most isolated)
#
# This follows the principle of least privilege — PostgreSQL can only be
# reached by the backend, never by Nginx or the browser.
# =============================================================================
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  db-net:
    driver: bridge
    internal: true  # No internet access for DB network

# =============================================================================
# VOLUMES
# =============================================================================
# WHY named volumes: They persist across container rebuilds and are managed
# by Docker (easy to backup, inspect, and migrate).
# =============================================================================
volumes:
  frontend-dist:
    name: solarcrm-frontend-dist
  postgres-data:
    name: solarcrm-postgres-data
  uptime-kuma-data:
    name: solarcrm-uptime-kuma-data
  # redis-data:
  #   name: solarcrm-redis-data
  # qdrant-data:
  #   name: solarcrm-qdrant-data
