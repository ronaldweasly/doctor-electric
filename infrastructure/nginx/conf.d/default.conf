# =============================================================================
# SolarCRM - Server Block Configuration
# =============================================================================
# Handles: Frontend + Backend API + Monitoring Dashboard
#
# SSL NOTE: Cloudflare terminates SSL. The connection from Cloudflare to our
# Nginx is over HTTP (within Cloudflare's tunnel) or you can enable
# "Full (Strict)" SSL by installing Cloudflare Origin certificates.
# Instructions for both modes are included below.
# =============================================================================

# ─── REDIRECT HTTP → HTTPS ──────────────────────────────────────────────────
server {
    listen 80;
    server_name crm.yourdomain.com;

    # Let's Encrypt ACME challenge (for origin certificates)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check endpoint (for Docker/monitoring over HTTP)
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── MAIN HTTPS SERVER ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name crm.yourdomain.com;

    # ─── SSL CONFIGURATION ───────────────────────────────────────────────────
    # Option 1: Cloudflare Origin Certificate (recommended for Full Strict)
    # Generate at: Cloudflare Dashboard → SSL/TLS → Origin Server → Create Certificate
    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ─── SECURITY HEADERS ───────────────────────────────────────────────────
    # WHY each header matters:

    # Prevents the browser from MIME-sniffing (guessing content types)
    add_header X-Content-Type-Options "nosniff" always;

    # Prevents the page from being embedded in iframes (anti-clickjacking)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Enables the browser's XSS filter
    add_header X-XSS-Protection "1; mode=block" always;

    # Controls what info is sent in the Referer header
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restricts browser features (camera, mic, geolocation, etc.)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy — allows your domain + Cloudflare + Google Fonts
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob: https://*.r2.cloudflarestorage.com;
        connect-src 'self' https://generativelanguage.googleapis.com;
        frame-ancestors 'self';
        base-uri 'self';
        form-action 'self';
    " always;

    # ─── CLOUDFLARE REAL IP ──────────────────────────────────────────────────
    # Trust Cloudflare's IP ranges so we get the real client IP
    # These are Cloudflare's IPv4 ranges (update periodically)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ─── BACKEND API ─────────────────────────────────────────────────────────
    location /api/ {
        # Rate limiting: 10 req/s burst of 20
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Don't buffer API responses
        proxy_buffering off;
    }

    # Stricter rate limit on login endpoint
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ─── MONITORING DASHBOARD ────────────────────────────────────────────────
    # Accessible at /status — password-protected by Uptime Kuma itself
    location /status/ {
        proxy_pass http://monitoring/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── STATIC FRONTEND ────────────────────────────────────────────────────
    # Serve the built Vite/React app
    root /usr/share/nginx/html;
    index index.html;

    # Static assets (JS, CSS, images) — long cache, immutable
    # WHY: Vite uses content-hashed filenames, so we can cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon and other static files
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # SPA fallback — all routes serve index.html
    # WHY: React Router handles client-side routing. Without this,
    # refreshing on /clients/123 would return a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── ERROR PAGES ─────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
