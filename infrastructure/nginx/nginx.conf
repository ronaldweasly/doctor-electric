# =============================================================================
# SolarCRM Nginx - Main Configuration
# =============================================================================
# Production-grade reverse proxy configuration for:
# - Static frontend serving
# - Backend API proxying
# - Uptime Kuma monitoring dashboard
# - Security headers
# - Gzip compression
# - Rate limiting
# - Cloudflare integration
#
# WHY Nginx over Traefik/Caddy:
# - Minimal memory footprint (~5MB vs ~50MB)
# - Battle-tested at massive scale
# - Cloudflare handles SSL termination, so we don't need auto-cert
# - Simple, transparent configuration
# =============================================================================

# Worker configuration
# WHY auto: Matches the number of CPU cores on the VPS
worker_processes auto;

# Max open files per worker (should be >= worker_connections * 2)
worker_rlimit_nofile 4096;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # Max simultaneous connections per worker
    # For 1-50 users, 1024 is more than sufficient
    worker_connections 1024;
    
    # Accept multiple connections at once
    multi_accept on;
}

http {
    # ─── BASIC SETTINGS ──────────────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format — includes Cloudflare real IP
    log_format main '$http_cf_connecting_ip - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 25m;  # Max upload size (matches backend limit)

    # Gzip compression
    # WHY: Reduces bandwidth by 60-80% for text-based assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;  # 4 is a good balance of CPU vs compression ratio
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ─── SECURITY ────────────────────────────────────────────────────────────
    # Hide Nginx version in error pages and headers
    server_tokens off;

    # ─── RATE LIMITING ───────────────────────────────────────────────────────
    # WHY: Defense in depth — even though Cloudflare rate-limits,
    # this catches any traffic that bypasses Cloudflare
    limit_req_zone $http_cf_connecting_ip zone=api:10m rate=10r/s;
    limit_req_zone $http_cf_connecting_ip zone=login:10m rate=1r/s;

    # ─── UPSTREAM DEFINITIONS ────────────────────────────────────────────────
    upstream backend {
        server backend:4000;
        keepalive 32;  # Persistent connections to backend
    }

    upstream monitoring {
        server uptime-kuma:3001;
    }

    # Include server block configurations
    include /etc/nginx/conf.d/*.conf;
}
