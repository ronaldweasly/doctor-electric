<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Blue background circle -->
  <circle cx="100" cy="100" r="100" fill="#0052A3"/>
  
  <!-- White horizontal bars -->
  <rect x="35" y="75" width="130" height="15" fill="white"/>
  <rect x="35" y="110" width="130" height="15" fill="white"/>
  
  <!-- Red plug icons on sides -->
  <g id="left-plug">
    <circle cx="50" cy="82.5" r="8" fill="none" stroke="#CC0000" stroke-width="2"/>
    <line x1="50" y1="75" x2="50" y2="65" stroke="#CC0000" stroke-width="2" stroke-linecap="round"/>
    <line x1="45" y1="72" x2="40" y2="67" stroke="#CC0000" stroke-width="2" stroke-linecap="round"/>
    <circle cx="50" cy="117.5" r="8" fill="none" stroke="#CC0000" stroke-width="2"/>
    <line x1="50" y1="125" x2="50" y2="135" stroke="#CC0000" stroke-width="2" stroke-linecap="round"/>
    <line x1="45" y1="128" x2="40" y2="133" stroke="#CC0000" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <g id="right-plug">
    <circle cx="150" cy="82.5" r="8" fill="none" stroke="#CC0000" stroke-width="2"/>
    <line x1="150" y1="75" x2="150" y2="65" stroke="#CC0000" stroke-width="2" stroke-linecap="round"/>
    <line x1="155" y1="72" x2="160" y2="67" stroke="#CC0000" stroke-width="2" stroke-linecap="round"/>
    <circle cx="150" cy="117.5" r="8" fill="none" stroke="#CC0000" stroke-width="2"/>
    <line x1="150" y1="125" x2="150" y2="135" stroke="#CC0000" stroke-width="2" stroke-linecap="round"/>
    <line x1="155" y1="128" x2="160" y2="133" stroke="#CC0000" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Tech grid pattern in center -->
  <g id="grid" opacity="0.3">
    <line x1="70" y1="50" x2="130" y2="50" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="70" y1="60" x2="130" y2="60" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="70" y1="70" x2="130" y2="70" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="70" y1="130" x2="130" y2="130" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="70" y1="140" x2="130" y2="140" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="70" y1="150" x2="130" y2="150" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="70" y1="50" x2="70" y2="150" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="80" y1="50" x2="80" y2="150" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="90" y1="50" x2="90" y2="150" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="110" y1="50" x2="110" y2="150" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="120" y1="50" x2="120" y2="150" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="130" y1="50" x2="130" y2="150" stroke="#FFFFFF" stroke-width="1"/>
  </g>
  
  <!-- Lightning bolt in center -->
  <g id="lightning">
    <!-- Yellow/Orange lightning -->
    <polygon points="100,50 115,95 105,95 120,150 80,100 90,100 75,50" fill="#FFB200"/>
    <!-- Red lightning overlay -->
    <polygon points="100,55 112,90 105,90 115,140 85,105 90,105 80,55" fill="#CC0000"/>
  </g>
  
  <!-- Outer ring text -->
  <defs>
    <path id="topText" d="M 30,100 A 70,70 0 0,1 170,100" fill="none"/>
    <path id="bottomText" d="M 170,100 A 70,70 0 0,1 30,100" fill="none"/>
  </defs>
  
  <text font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" letter-spacing="2">
    <textPath href="#topText" startOffset="50%" text-anchor="middle">
      DOCTOR ELECTRIC
    </textPath>
  </text>
  
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" letter-spacing="1">
    <textPath href="#bottomText" startOffset="50%" text-anchor="middle">
      VARANASI
    </textPath>
  </text>
</svg>